name: Flutter Tag Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 1.4.7). Leave empty when triggered from a tag push.'
        required: false
        type: string
        default: ''
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-[0-9]+'

permissions:
  contents: write

jobs:
  run-flutter-tag-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      upload-artifact: true
      upload-tag: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}